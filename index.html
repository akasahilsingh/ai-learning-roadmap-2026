<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Learning Roadmap 2026 — Personalized 90-Day Curriculum</title>
    <meta name="description" content="A personalized, interactive 90-day AI learning roadmap tailored to your background, goals, and daily time commitment. Track progress, check off tasks, and access curated resources.">
    <meta name="keywords" content="AI learning roadmap, machine learning roadmap, LLM course, prompt engineering, AI curriculum 2026">
    <meta property="og:title" content="AI Learning Roadmap 2026">
    <meta property="og:description" content="Build your personalized 90-day AI learning trajectory. Track tasks, explore curated resources, and level up your AI skills.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#4F46E5">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050507;
            --surface: rgba(20, 20, 30, 0.65);
            --surface-hover: rgba(35, 35, 55, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.15);
            --primary: #6366F1;
            --primary-hover: #4F46E5;
            --primary-glow: rgba(99, 102, 241, 0.25);
            --accent: #10B981;
            --accent-glow: rgba(16, 185, 129, 0.2);
            --warning: #F59E0B;
            --text-main: #F1F5F9;
            --text-muted: #8B949E;
            --text-faint: #4B5563;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 22px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99, 102, 241, 0.18) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 90% 80%, rgba(16, 185, 129, 0.06) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* ── Glassmorphism ── */
        .glass {
            background: var(--surface);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
        }

        /* ── Typography ── */
        h1, h2, h3, h4 { font-weight: 700; letter-spacing: -0.025em; line-height: 1.2; }
        h1 { font-size: clamp(2rem, 5vw, 3.5rem); }
        h2 { font-size: 1.5rem; }
        h3 { font-size: 1.15rem; }
        p { color: var(--text-muted); }

        /* ── Layout ── */
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        /* ── Buttons ── */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.75rem;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            letter-spacing: -0.01em;
        }
        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow);
        }
        .btn:active { transform: translateY(0); }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-strong);
            color: var(--text-main);
        }
        .btn-outline:hover {
            background: var(--surface-hover);
            box-shadow: none;
            transform: translateY(-1px);
        }
        .btn-sm {
            padding: 0.45rem 1rem;
            font-size: 0.82rem;
            border-radius: 6px;
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: var(--transition);
        }
        .btn-ghost:hover { border-color: var(--border-strong); color: var(--text-main); background: var(--surface); }

        /* ── Onboarding ── */
        #onboarding {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .step-container {
            max-width: 620px;
            width: 100%;
            animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .step-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 2.5rem;
        }
        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border-strong);
            transition: var(--transition);
        }
        .step-dot.active {
            background: var(--primary);
            width: 24px;
            border-radius: 4px;
        }
        .step-dot.done { background: var(--accent); }

        .onboarding-title {
            font-size: clamp(2.2rem, 6vw, 3.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, rgba(99,102,241,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.75rem;
        }
        .onboarding-sub {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 0;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.875rem;
            margin: 2rem 0;
        }
        .option-card {
            padding: 1.25rem 1rem;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.92rem;
            font-weight: 500;
            color: var(--text-muted);
            position: relative;
            overflow: hidden;
        }
        .option-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary-glow), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .option-card:hover { border-color: var(--border-strong); color: var(--text-main); transform: translateY(-2px); }
        .option-card:hover::before { opacity: 1; }
        .option-card.selected {
            border-color: var(--primary);
            color: var(--text-main);
            background: rgba(99, 102, 241, 0.12);
        }
        .option-card.selected::before { opacity: 1; }
        .option-icon { font-size: 1.5rem; margin-bottom: 0.5rem; display: block; }

        /* ── App Layout ── */
        #app {
            display: none;
            grid-template-columns: 290px 1fr;
            gap: 2rem;
            min-height: 100vh;
            padding: 2rem;
            max-width: 1440px;
            margin: 0 auto;
        }

        /* ── Sidebar ── */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            position: sticky;
            top: 2rem;
            height: calc(100vh - 4rem);
        }
        .profile-card { padding: 1.5rem; }
        .profile-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.5rem; }
        .profile-card h3 { font-size: 0.98rem; color: var(--text-main); margin-bottom: 1.25rem; font-weight: 600; letter-spacing: -0.01em; line-height: 1.5; }
        .sidebar-actions { display: flex; gap: 0.5rem; }

        /* ── Skill Tree ── */
        .skill-tree-container { padding: 1.25rem; flex-grow: 1; overflow-y: auto; }
        .skill-tree-container::-webkit-scrollbar { width: 4px; }
        .skill-tree-container::-webkit-scrollbar-track { background: transparent; }
        .skill-tree-container::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
        .skill-tree-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.875rem; }
        .skill-node {
            padding: 0.625rem 0.875rem;
            margin-bottom: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            font-size: 0.82rem;
            font-weight: 500;
            position: relative;
            transition: var(--transition);
            color: var(--text-muted);
        }
        .skill-node::after {
            content: '│';
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--border-strong);
            font-size: 10px;
            line-height: 1;
        }
        .skill-node:last-child::after { display: none; }
        .skill-node.active { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 14px var(--primary-glow); }
        .skill-node.completed { border-color: var(--accent); color: var(--accent); background: rgba(16,185,129,0.06); }
        .skill-node.completed::after { color: var(--accent); }

        /* ── Main Content ── */
        .main-content { display: flex; flex-direction: column; gap: 1.75rem; }

        /* ── Stats ── */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .stat-card { padding: 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
        .stat-value { font-size: 1.9rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.03em; line-height: 1; }
        .stat-label { font-size: 0.78rem; color: var(--text-muted); font-weight: 500; margin-top: 0.25rem; }
        .stat-icon { font-size: 1.75rem; opacity: 0.4; flex-shrink: 0; }

        /* ── SVG Progress Ring ── */
        .circular-chart { display: block; width: 72px; height: 72px; flex-shrink: 0; }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 3.5; }
        .circle { fill: none; stroke-width: 3.5; stroke-linecap: round; transition: stroke-dasharray 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .circular-chart.primary .circle { stroke: var(--primary); }
        .percentage { fill: var(--text-main); font-family: 'Inter', sans-serif; font-size: 0.5em; text-anchor: middle; font-weight: 700; }

        /* ── Current Focus Card ── */
        .current-week-card {
            padding: 1.75rem 2rem;
            border-left: 3px solid var(--primary);
            background: linear-gradient(135deg, rgba(99,102,241,0.07) 0%, var(--surface) 100%);
        }
        .focus-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--primary); margin-bottom: 0.5rem; }

        /* ── Toolbar ── */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.75rem; }
        .toolbar-title { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }
        .toolbar-actions { display: flex; gap: 0.5rem; align-items: center; }

        /* ── Week Cards ── */
        .roadmap-container { display: flex; flex-direction: column; gap: 0.875rem; }
        .week-card { padding: 1.25rem 1.5rem; cursor: pointer; transition: var(--transition); }
        .week-card:hover { background: var(--surface-hover); }
        .week-header { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
        .week-title-row { display: flex; align-items: center; gap: 0.875rem; flex: 1; min-width: 0; }
        .week-num {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: rgba(99,102,241,0.12);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.78rem; font-weight: 700; color: var(--primary);
            flex-shrink: 0;
        }
        .week-num.done { background: rgba(16,185,129,0.12); color: var(--accent); }
        .week-title-text { font-size: 1rem; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .week-meta { display: flex; gap: 0.5rem; flex-shrink: 0; align-items: center; }
        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 5px;
            background: rgba(255,255,255,0.06);
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .badge-theme { color: var(--primary); background: rgba(99,102,241,0.1); }
        .chevron { font-size: 0.75rem; color: var(--text-faint); transition: transform 0.25s; margin-left: 0.25rem; }
        .week-card.expanded .chevron { transform: rotate(180deg); }

        /* ── Week Progress Bar ── */
        .week-progress-bar-wrap { margin-top: 0.75rem; }
        .week-progress-bar-bg {
            height: 3px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
        }
        .week-progress-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .week-progress-label { font-size: 0.72rem; color: var(--text-faint); margin-top: 0.3rem; font-weight: 500; }

        /* ── Week Details ── */
        .week-details { display: none; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); animation: slideDown 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .week-card.expanded .week-details { display: block; }

        /* ── Tasks ── */
        .section-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.75rem; }
        .task-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 0.875rem;
            padding: 0.75rem 1rem;
            background: rgba(0,0,0,0.18);
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            transition: var(--transition);
        }
        .task-item:hover { border-color: var(--border); }
        .task-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border: 1.5px solid var(--text-faint);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            margin-top: 2px;
            flex-shrink: 0;
            transition: var(--transition);
        }
        .task-item input[type="checkbox"]:hover { border-color: var(--primary); }
        .task-item input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
        .task-item input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            left: 2px; top: -1px;
        }
        .task-content { flex-grow: 1; min-width: 0; }
        .task-title { font-size: 0.9rem; font-weight: 500; color: var(--text-main); transition: var(--transition); }
        .task-item input[type="checkbox"]:checked ~ .task-content .task-title {
            color: var(--text-faint);
            text-decoration: line-through;
        }
        .task-note {
            margin-top: 0.4rem;
            font-size: 0.78rem;
            color: var(--text-muted);
            font-style: italic;
        }
        .task-note-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px dashed var(--border);
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.78rem;
            font-style: italic;
            padding: 0.2rem 0;
            outline: none;
            margin-top: 0.35rem;
            display: none;
            transition: var(--transition);
        }
        .task-note-input::placeholder { color: var(--text-faint); }
        .task-note-input:focus { border-color: var(--primary); color: var(--text-main); }
        .task-note-input.visible { display: block; }
        .note-btn {
            font-size: 0.7rem;
            color: var(--text-faint);
            cursor: pointer;
            margin-top: 0.3rem;
            display: inline-block;
            transition: color 0.2s;
        }
        .note-btn:hover { color: var(--primary); }

        /* ── Resources ── */
        .resource-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0.75rem; margin-top: 0.75rem; }
        .resource-card {
            padding: 0.875rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.02);
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .resource-card:hover { border-color: var(--primary); background: rgba(99,102,241,0.07); transform: translateY(-2px); }
        .resource-tag-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.1rem; }
        .resource-type {
            font-size: 0.68rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            font-weight: 700;
            padding: 0.15rem 0.45rem;
            background: rgba(99,102,241,0.1);
            border-radius: 4px;
        }
        .resource-free-badge {
            font-size: 0.65rem;
            color: var(--accent);
            font-weight: 700;
            padding: 0.15rem 0.4rem;
            background: rgba(16,185,129,0.1);
            border-radius: 4px;
            letter-spacing: 0.04em;
        }
        .resource-title { font-weight: 600; font-size: 0.88rem; color: var(--text-main); line-height: 1.4; }
        .resource-provider { font-size: 0.76rem; color: var(--text-muted); }

        /* ── Toast Notification ── */
        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface-hover);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
            backdrop-filter: blur(16px);
            z-index: 9999;
            transform: translateY(calc(100% + 2rem));
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #toast.show { transform: translateY(0); }

        /* ── Animations ── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            #app { grid-template-columns: 260px 1fr; gap: 1.5rem; }
        }
        @media (max-width: 860px) {
            #app { grid-template-columns: 1fr; padding: 1rem; }
            .sidebar { position: relative; height: auto; top: 0; }
            .skill-tree-container { max-height: 220px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 560px) {
            .stats-grid { grid-template-columns: 1fr; }
            .week-title-text { font-size: 0.9rem; }
            .resource-list { grid-template-columns: 1fr; }
            #app { padding: 0.75rem; }
        }
    </style>
</head>
<body>

    <!-- ── Onboarding ── -->
    <div id="onboarding">
        <div class="step-container">
            <div class="step-dots">
                <div class="step-dot" id="dot-1"></div>
                <div class="step-dot" id="dot-2"></div>
                <div class="step-dot" id="dot-3"></div>
            </div>
            <div id="onboarding-body"></div>
        </div>
    </div>

    <!-- ── Main App ── -->
    <div id="app">
        <aside class="sidebar">
            <div class="glass profile-card">
                <div class="profile-label">Your Profile</div>
                <h3 id="profile-summary">Tech Pro • 1h/day • Build</h3>
                <div class="sidebar-actions">
                    <button class="btn btn-outline btn-sm" onclick="resetProfile()" style="flex:1;">↺ Reset</button>
                    <button class="btn-ghost" onclick="exportProgress()" title="Export progress as JSON">⬇ Export</button>
                </div>
            </div>

            <div class="glass skill-tree-container">
                <div class="skill-tree-label">Skill Progression</div>
                <div id="skill-tree"></div>
            </div>
        </aside>

        <main class="main-content">
            <!-- Stats Row -->
            <div class="stats-grid">
                <div class="glass stat-card">
                    <div>
                        <div class="stat-label">Overall Progress</div>
                        <div class="stat-value" id="stat-progress">0%</div>
                    </div>
                    <svg viewBox="0 0 36 36" class="circular-chart primary">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        <path class="circle" id="overall-ring" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        <text x="18" y="20.35" class="percentage" id="ring-pct">0%</text>
                    </svg>
                </div>
                <div class="glass stat-card">
                    <div>
                        <div class="stat-label">Hours Invested</div>
                        <div class="stat-value" id="stat-hours">0</div>
                    </div>
                    <div class="stat-icon">⏱️</div>
                </div>
                <div class="glass stat-card">
                    <div>
                        <div class="stat-label">Day Streak</div>
                        <div class="stat-value" id="stat-streak">0</div>
                    </div>
                    <div class="stat-icon">🔥</div>
                </div>
            </div>

            <!-- Current Focus -->
            <div class="glass current-week-card">
                <div class="focus-label">▶ Current Focus</div>
                <h2 id="current-focus-title" style="margin-bottom: 0.35rem;">Week 1: AI Fundamentals</h2>

function init() {
    const saved = localStorage.getItem('aiRoadmap2026v2');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            state = { ...state, ...parsed };
        } catch(e) {}
    }
    if (state.profile.bg && state.profile.time && state.profile.goal) {
        loadApp();
    } else {
        setupOnboarding();
    }
}

function saveState() {
    localStorage.setItem('aiRoadmap2026v2', JSON.stringify(state));
}

function resetProfile() {
    if (confirm('Reset all progress and regenerate your roadmap?')) {
        localStorage.removeItem('aiRoadmap2026v2');

function setupOnboarding() {
    document.getElementById('onboarding').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    renderOnboardingStep();
}

function renderOnboardingStep() {
    const step  = STEPS[currentStep - 1];
    const body  = document.getElementById('onboarding-body');
    const isLast = currentStep === STEPS.length;
    const curVal = state.profile[step.stateKey];

    // ── Update step dots ──
    STEPS.forEach((_, i) => {
        const dot = document.getElementById(`dot-${i + 1}`);
        dot.className = 'step-dot';
        if (i + 1 < currentStep)  dot.classList.add('done');
        if (i + 1 === currentStep) dot.classList.add('active');
    });

    // ── Show title only on step 1 ──
    const titleHtml = currentStep === 1
        ? `<h1 class="onboarding-title">🧠 AI Learning Roadmap</h1>
           <p class="onboarding-sub" style="margin-bottom:2rem;">Build your personalized 90-day AI curriculum — free, curated, and adaptive.</p>`
        : '';

    // ── Options grid ──
    const optionsHtml = step.options.map(o => `
        <div class="option-card${curVal === o.val ? ' selected' : ''}" data-val="${o.val}" onclick="selectOption(this, '${step.stateKey}', '${o.val}')">
            <span class="option-icon">${o.icon}</span>
            <span style="font-weight:600;">${o.label}</span>
            <small style="color:var(--text-faint);font-size:0.75rem;display:block;margin-top:2px;">${o.hint}</small>
        </div>`).join('');

    // ── Navigation buttons ──
    const backBtn = currentStep > 1
        ? `<button class="btn btn-outline" onclick="goBack()" style="min-width:120px;">← Back</button>`
        : '';
    const nextLabel = isLast ? '🚀 Generate My Roadmap' : 'Continue →';
    const nextDisabled = !curVal ? 'opacity:0.4;pointer-events:none;' : '';

    body.innerHTML = `
        ${titleHtml}
        <h2 style="margin-bottom:0.25rem;">${step.heading}</h2>
        <p style="margin-bottom:0;">${step.sub}</p>
        <div class="options-grid" style="margin-bottom:0;">${optionsHtml}</div>
        <div style="display:flex;gap:0.75rem;justify-content:center;margin-top:1.5rem;">
            ${backBtn}
            <button class="btn" id="btn-next" style="min-width:180px;${nextDisabled}" onclick="goNext()">${nextLabel}</button>
        </div>`;
}

function selectOption(el, key, val) {
    // Update state
    state.profile[key] = val;
    // Update UI — deselect siblings, select clicked
    el.closest('.options-grid').querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    // Enable Next button
    const btn = document.getElementById('btn-next');
    if (btn) { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; }
}

function goNext() {
    const step = STEPS[currentStep - 1];
    if (!state.profile[step.stateKey]) return; // guard — shouldn't happen
    if (currentStep < STEPS.length) {
        currentStep++;
        renderOnboardingStep();
    } else {
        // Final step — launch app
        saveState();
        document.getElementById('onboarding').style.display = 'none';
        loadApp();
    }
}

function goBack() {
    if (currentStep > 1) {
        currentStep--;
        renderOnboardingStep();
    }
}

    const goalMap = { Work: 'Use AI at Work', Build: 'Build with AI', Career: 'Career Switch' };
    document.getElementById('profile-summary').textContent =
        `${bgMap[state.profile.bg] || state.profile.bg} · ${timeMap[state.profile.time]} · ${goalMap[state.profile.goal]}`;

    const roadmapData = buildCurriculum();
    renderSkillTree(roadmapData);
    renderRoadmap(roadmapData);
    updateDashboard(roadmapData);
}

function renderSkillTree(data) {
    const container = document.getElementById('skill-tree');
    container.innerHTML = '';
    const themes = [...new Set(data.map(w => w.theme))];

    themes.forEach(theme => {
        const div = document.createElement('div');
        div.className = 'skill-node';
        const relatedWeeks = data.filter(w => w.theme === theme);
        const allIds    = relatedWeeks.flatMap(w => w.tasks.map((_, i) => `${w.id}-${i}`));
        const doneCount = allIds.filter(id => state.progress[id]).length;

        if (allIds.length > 0 && doneCount === allIds.length) div.classList.add('completed');
        else if (doneCount > 0) div.classList.add('active');

        div.textContent = theme;
        container.appendChild(div);
    });
}

function renderRoadmap(data) {
    const container = document.getElementById('roadmap-container');
    container.innerHTML = '';

    data.forEach(week => {
        const totalTasks = week.tasks.length;
        const doneTasks  = week.tasks.filter((_, i) => state.progress[`${week.id}-${i}`]).length;
        const pct        = totalTasks ? Math.round((doneTasks / totalTasks) * 100) : 0;
        const isDone     = totalTasks > 0 && doneTasks === totalTasks;

        // Resources HTML
        let resourcesHtml = '';
        if (week.resources && week.resources.length > 0) {
            resourcesHtml = `
                <div style="margin-top: 1.5rem;">
                    <div class="section-label">📚 Learning Resources</div>
                    <div class="resource-list">
                        ${week.resources.map(r => `
                            <a href="${r.url}" target="_blank" rel="noopener noreferrer" class="resource-card">
                                <div class="resource-tag-row">
                                    <span class="resource-type">${r.type}</span>
                                    ${r.free ? '<span class="resource-free-badge">FREE</span>' : ''}
                                </div>
                                <div class="resource-title">${r.title}</div>
                                <div class="resource-provider">${r.provider}</div>
                            </a>
                        `).join('')}
                    </div>
                </div>`;
        }

        // Tasks HTML
        const tasksHtml = `
            <div class="section-label">✅ Action Items</div>
            <ul class="task-list">
                ${week.tasks.map((t, i) => {
                    const taskId = `${week.id}-${i}`;
                    const note   = state.notes[taskId] || '';
                    return `
                    <li class="task-item">
                        <input type="checkbox" id="${taskId}" ${state.progress[taskId] ? 'checked' : ''} onchange="toggleTask('${taskId}')">
                        <label for="${taskId}" class="task-content">
                            <div class="task-title">${t}</div>
                            <span class="note-btn" onclick="toggleNote('${taskId}', event)">📝 ${note ? 'Edit note' : 'Add note'}</span>
                            <input
                                type="text"
                                class="task-note-input ${note ? 'visible' : ''}"
                                id="note-${taskId}"
                                placeholder="Your notes…"
                                value="${note.replace(/"/g, '&quot;')}"
                                onchange="saveNote('${taskId}', this.value)"
                                onclick="event.stopPropagation()"
                            >
                        </label>
                    </li>`;
                }).join('')}
            </ul>`;

        const card = document.createElement('div');
        card.className = 'glass week-card';
        card.id = `card-${week.id}`;
        card.innerHTML = `
            <div class="week-header" onclick="toggleWeek('${week.id}')">
                <div class="week-title-row">
                    <div class="week-num ${isDone ? 'done' : ''}">${isDone ? '✓' : week.num}</div>
                    <div class="week-title-text">Week ${week.num}: ${week.title}</div>
                </div>
                <div class="week-meta">
                    <span class="badge badge-theme">${week.theme}</span>
                    <span class="badge">~${week.hours}h</span>
                    <span class="chevron">▾</span>
                </div>
            </div>
            <div class="week-progress-bar-wrap">
                <div class="week-progress-bar-bg">
                    <div class="week-progress-bar-fill" style="width:${pct}%"></div>
                </div>
                <div class="week-progress-label">${doneTasks} / ${totalTasks} tasks · ${pct}%</div>
            </div>
            <div class="week-details">
                ${tasksHtml}
                ${resourcesHtml}
            </div>`;
        container.appendChild(card);
    });

    expandCurrentWeek(data);
}

function expandCurrentWeek(data) {
    for (let i = 0; i < data.length; i++) {
        const w = data[i];
        const done = w.tasks.filter((_, j) => state.progress[`${w.id}-${j}`]).length;
        if (done < w.tasks.length || i === data.length - 1) {
            document.getElementById(`card-${w.id}`)?.classList.add('expanded');
            document.getElementById('current-focus-title').textContent = `Week ${w.num}: ${w.title}`;
            document.getElementById('current-focus-desc').textContent =
                `${w.theme} · ${w.tasks.length - done} task${w.tasks.length - done !== 1 ? 's' : ''} remaining · ~${w.hours}h this week`;
            break;
        }
    }
}

function toggleWeek(id) {
    document.getElementById(`card-${id}`)?.classList.toggle('expanded');
}

function collapseAll() {
    document.querySelectorAll('.week-card.expanded').forEach(c => c.classList.remove('expanded'));
}

// ─────────────────────────────────────────────
//  TASK INTERACTION
// ─────────────────────────────────────────────
function toggleTask(taskId) {
    state.progress[taskId] = !state.progress[taskId];

    // Streak: only bump once per calendar day
    const today = new Date().toDateString();
    if (state.progress[taskId] && state.stats.lastActiveDate !== today) {
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        if (state.stats.lastActiveDate === yesterday) {
            state.stats.streak++;
        } else if (state.stats.lastActiveDate !== today) {
            state.stats.streak = 1; // reset if gap
        }
        state.stats.lastActiveDate = today;
    }

    saveState();
    const data = buildCurriculum();
    updateDashboard(data);
    renderSkillTree(data);

    // Update week header & progress bar without closing
    const [wId] = taskId.split('-');
    const week  = data.find(w => w.id === wId);
    if (!week) return;
    const total = week.tasks.length;
    const done  = week.tasks.filter((_, i) => state.progress[`${week.id}-${i}`]).length;
    const pct   = total ? Math.round((done / total) * 100) : 0;
    const isDone = done === total && total > 0;

    const numEl = document.querySelector(`#card-${wId} .week-num`);
    if (numEl) { numEl.textContent = isDone ? '✓' : week.num; numEl.className = `week-num${isDone ? ' done' : ''}`; }

    const barFill = document.querySelector(`#card-${wId} .week-progress-bar-fill`);
    if (barFill) barFill.style.width = `${pct}%`;
    const barLabel = document.querySelector(`#card-${wId} .week-progress-label`);
    if (barLabel) barLabel.textContent = `${done} / ${total} tasks · ${pct}%`;

    expandCurrentWeek(data);

    if (state.progress[taskId]) showToast('✅ Task complete!');
}

function toggleNote(taskId, e) {
    e.preventDefault();
    e.stopPropagation();
    const input = document.getElementById(`note-${taskId}`);
    if (input) { input.classList.toggle('visible'); if (input.classList.contains('visible')) input.focus(); }
}

function saveNote(taskId, value) {
    state.notes[taskId] = value.trim();
    saveState();
}

// ─────────────────────────────────────────────
//  DASHBOARD
// ─────────────────────────────────────────────
function updateDashboard(data) {
    let totalTasks = 0, doneTasks = 0, totalHours = 0;
    data.forEach(w => {
        totalHours += w.hours;
        w.tasks.forEach((_, i) => {
            totalTasks++;
            if (state.progress[`${w.id}-${i}`]) doneTasks++;
        });
    });

    const pct           = totalTasks ? Math.round((doneTasks / totalTasks) * 100) : 0;
    const investedHours = Math.round((pct / 100) * totalHours);

    document.getElementById('stat-progress').textContent = `${pct}%`;
    document.getElementById('stat-hours').textContent    = investedHours;
    document.getElementById('stat-streak').textContent   = state.stats.streak;

    const ring = document.getElementById('overall-ring');
    ring.setAttribute('stroke-dasharray', `${pct}, 100`);
    ring.style.stroke = pct === 100 ? 'var(--accent)' : 'var(--primary)';
    const pctText = document.getElementById('ring-pct');
    if (pctText) pctText.textContent = `${pct}%`;
}

// ─────────────────────────────────────────────
//  EXPORT
// ─────────────────────────────────────────────
function exportProgress() {
    const data = buildCurriculum();
    const exportData = {
        exportedAt: new Date().toISOString(),
        profile:    state.profile,
        stats:      state.stats,
        progress:   state.progress,
        notes:      state.notes,
        weeks: data.map(w => ({
            week:      w.num,
            title:     w.title,
            theme:     w.theme,
            tasks:     w.tasks.map((t, i) => ({
                task:      t,
                completed: !!state.progress[`${w.id}-${i}`],
                note:      state.notes[`${w.id}-${i}`] || ''
            }))
        }))
    };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `ai-roadmap-progress-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    showToast('📥 Progress exported!');
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Boot ──
init();
</script>
</body>
</html>
